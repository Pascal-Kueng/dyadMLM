# Temporary publisher for fix/workshop-model-comparison.
# Delete this file on that branch immediately before merging into main so the
# workflow has no net effect on main's tree.
name: Workshop draft (temporary)

on:
  push:
    branches:
      - fix/workshop-model-comparison
    # Deliberately no paths filter: every branch push rebuilds all materials.

permissions:
  contents: write

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    # Match the non-PR deployment group in pkgdown.yaml so two jobs cannot
    # update gh-pages concurrently.
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::DHARMa
            any::ggplot2
            any::gridExtra
            any::patchwork
            any::pkgdown
            any::RSA
            any::see
            any::tidyr
            local::.
          needs: website

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render all workshop materials
        run: |
          quarto render dev/workshop/dyad-day.qmd
          quarto render dev/workshop/applied-tutorial.qmd

      - name: Build site
        shell: Rscript {0}
        run: |
          pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)

      - name: Add workshop materials
        run: |
          mkdir -p docs/workshop/conceptual docs/workshop/applied
          Rscript -e 'pkgdown::init_site(); pkgdown::render_page(".", "workshop", data = list(pagetitle = "Workshop", description = "Dyadic Data Analysis workshop materials."), path = "workshop/index.html", depth = 1)'
          cp dev/workshop/dyad-day.html docs/workshop/conceptual/index.html
          cp dev/workshop/applied-tutorial.html docs/workshop/applied/index.html
          cp dev/workshop/exercises.Rmd docs/workshop/exercises.Rmd

      - name: Deploy the full branch site
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: docs
          clean: true
          force: false
          attempt-limit: 5
          commit-message: "Deploy full branch site from ${{ github.sha }}"
